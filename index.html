<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Happy 25th 🎉</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 24px;
      width: 360px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      animation: cardFade 0.35s ease;
      transition: opacity 0.25s ease;
    }

    h1 { margin-top: 0; font-weight: 600; }

    .media-wrapper {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      margin: 16px 0;
    }

    .media-wrapper img,
    .media-wrapper video {
      width: 100%;
      display: block;
      animation: mediaEnter 0.5s ease;
    }

    video { background: black; }

    .question { font-size: 16px; margin-bottom: 12px; }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      margin-bottom: 8px;
    }

    input:focus { outline: 2px solid #00c6ff; }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #00c6ff;
      color: black;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      margin-top: 4px;
    }

    button:hover { background: #00aee6; }

    .progress {
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.8;
    }

    .error {
      color: #ff6b6b;
      font-size: 14px;
      margin-top: 6px;
    }

    .reveal { animation: revealGift 1s ease forwards; }

    .code {
      font-size: 22px;
      letter-spacing: 3px;
      margin-top: 12px;
      animation: glow 1.5s infinite alternate;
    }

    @keyframes cardFade {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes mediaEnter {
      from { opacity: 0; transform: scale(1.03) translateY(6px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes revealGift {
      0% { opacity: 0; transform: scale(0.96); }
      60% { opacity: 1; transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    @keyframes glow {
      from { text-shadow: 0 0 5px #00c6ff; }
      to { text-shadow: 0 0 15px #00c6ff; }
    }
  </style>
</head>
<body>

<div class="card" id="app"></div>

<script>
/* ---------------------------
   HASH FUNCTION
----------------------------*/
async function hash(text) {
  const msg = new TextEncoder().encode(text.toLowerCase());
  const buffer = await crypto.subtle.digest("SHA-256", msg);
  return Array.from(new Uint8Array(buffer))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}

/* ---------------------------
   PUZZLES (HASHED)
----------------------------*/
const puzzles = [

  { type:"image", src:"images/11.JPG", question:"What holiday was this photo?", answerHash:"9eb7ee7f551d2f0ac684981bd1f1e2fa4a37590199636753efe614d4db30e8e1" },

  { type:"video", src:"images/21.mp4", question:"Who wrote the song we were singing?", answerHash:"c07d72b68377c374949c47406e7d670bff3b23614081aee626edf6bd34d4db5a" },

  { type:"image", src:"images/24.PNG", question:"Wtf did you draw here?", answerHash:"960a38ace75a2fe9426aa5d48b536cc6db18a2023b9bdd698e562fc3023585a6" },
  { type:"video", src:"images/25.mp4", question:"Did you go out with this girl?", answerHash:"9390298f3fb0c5b160498935d79cb139aef28e1c47358b4bbba61862b9c26e59" }
];

const STEAM_CODE = atob("IREALIZEDTHISCOULDGETSTOLENSOTEXTME");

let current = 0;
const app = document.getElementById("app");

function renderPuzzle() {
  const p = puzzles[current];
  const media = p.type === "video"
    ? `<video src="${p.src}" controls playsinline></video>`
    : `<img src="${p.src}" />`;

  app.innerHTML = `
    <h1>Happy 25th Birthday 🎂</h1>
    <div class="media-wrapper">${media}</div>
    <div class="question">${p.question}</div>
    <input id="answer" placeholder="Your answer..." autocomplete="off" />
    <button onclick="submitAnswer()">Submit</button>
    <div class="error" id="error"></div>
    <div class="progress">Question ${current + 1} / 25</div>
  `;
}

async function submitAnswer() {
  const input = document.getElementById("answer").value.trim();
  const inputHash = await hash(input);

  if (inputHash === puzzles[current].answerHash) {
    const video = document.querySelector("video");
    if (video) video.pause();

    app.style.opacity = 0;
    setTimeout(() => {
      current++;
      current === puzzles.length ? revealGift() : (app.style.opacity = 1, renderPuzzle());
    }, 250);
  } else {
    document.getElementById("error").textContent = "❌ Not quite — try again!";
  }
}

function revealGift() {
  app.style.opacity = 1;
  app.innerHTML = `
    <div class="reveal">
      <h1>🎉 You did it!</h1>
      <p>Your gift 🎁</p>
      <div class="code">${STEAM_CODE}</div>
    </div>
  `;
}

renderPuzzle();
</script>
</body>
</html>
