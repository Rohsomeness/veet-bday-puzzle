<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Happy 25th 🎉</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    /* --- Global reset & box model fix --- */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 24px;
      width: 360px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      animation: cardFade 0.35s ease;
      transition: opacity 0.25s ease;
    }

    h1 {
      margin-top: 0;
      font-weight: 600;
    }

    /* --- Media (image/video) --- */
    .media-wrapper {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      margin: 16px 0;
    }

    .media-wrapper img,
    .media-wrapper video {
      width: 100%;
      display: block;
      animation: mediaEnter 0.5s ease;
    }

    video {
      background: black;
    }

    .question {
      font-size: 16px;
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 16px;
      margin-bottom: 8px;
    }

    input:focus {
      outline: 2px solid #00c6ff;
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #00c6ff;
      color: black;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      margin-top: 4px;
    }

    button:hover {
      background: #00aee6;
    }

    .progress {
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.8;
    }

    .error {
      color: #ff6b6b;
      font-size: 14px;
      margin-top: 6px;
    }

    /* --- Final reveal --- */
    .reveal {
      animation: revealGift 1s ease forwards;
    }

    .code {
      font-size: 22px;
      letter-spacing: 3px;
      margin-top: 12px;
      animation: glow 1.5s infinite alternate;
    }

    /* --- Animations --- */
    @keyframes cardFade {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes mediaEnter {
      from {
        opacity: 0;
        transform: scale(1.03) translateY(6px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes revealGift {
      0% { opacity: 0; transform: scale(0.96); }
      60% { opacity: 1; transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    @keyframes glow {
      from { text-shadow: 0 0 5px #00c6ff; }
      to { text-shadow: 0 0 15px #00c6ff; }
    }
  </style>
</head>
<body>

  <div class="card" id="app"></div>

<script>
  /* ---------------------------
     PUZZLES CONFIG
  ----------------------------*/
  const puzzles = [
    {
      type: "image",
      src: "images/1.jpg",
      question: "What year was this taken?",
      answer: "2016"
    },
    {
      type: "image",
      src: "images/2.png",
      question: "What was the greened out message?",
      answer: "sueghandes nuts"
    },
    {
      type: "video",
      src: "images/3.mov",
      question: "What did you say next?",
      answer: "administration"
    },
    {
      type: "image",
      src: "images/4.JPG",
      question: "What score did you get?",
      answer: "720"
    },
    {
      type: "image",
      src: "images/5.PNG",
      question: "What is the blotted out word?",
      answer: "crcheated"
    },
    {
      type: "image",
      src: "images/7.JPG",
      question: "What is the name of the school where we took this picture?",
      answer: "Brandywine"
    },
    {
      type: "image",
      src: "images/8.PNG",
      question: "How many conversations were we maintaining at once?",
      answer: "14"
    },
    {
      type: "image",
      src: "images/9.PNG",
      question: "Was it Rohit or Vatan?",
      answer: "Vatan"
    },
    {
      type: "image",
      src: "images/10.PNG",
      question: "What was the caption of this post?",
      answer: "New fetish"
    },
    {
      type: "image",
      src: "images/11.JPG",
      question: "What holiday was this photo?",
      answer: "Halloween"
    },
    {
      type: "image",
      src: "images/12.JPG",
      question: "What movie did we watch before this photo?",
      answer: "Deadpool"
    },
    {
      type: "image",
      src: "images/13.mp4",
      question: "What level was this?",
      answer: "Hexagon force"
    },
  ];

  // Base64-obfuscated Steam code (optional)
  const STEAM_CODE = atob("WFhYWFgtWFhYWFgtWFhYWFg=");

  let current = 0;
  const app = document.getElementById("app");

  function renderPuzzle() {
    const p = puzzles[current];
    let mediaHTML = "";

    if (p.type === "image") {
      mediaHTML = `<img src="${p.src}" alt="memory" />`;
    } else if (p.type === "video") {
      mediaHTML = `
        <video src="${p.src}" controls playsinline></video>
      `;
    }

    app.innerHTML = `
      <h1>Happy 25th Birthday 🎂</h1>

      <div class="media-wrapper">
        ${mediaHTML}
      </div>

      <div class="question">${p.question}</div>

      <input id="answer" placeholder="Your answer..." autocomplete="off" />
      <button onclick="submitAnswer()">Submit</button>

      <div class="error" id="error"></div>
      <div class="progress">Question ${current + 1} / 25</div>
    `;
  }

  function submitAnswer() {
    const input = document.getElementById("answer").value.trim().toLowerCase();
    if (input === puzzles[current].answer.toLowerCase()) {

      // Pause video if present
      const video = document.querySelector("video");
      if (video) video.pause();

      app.style.opacity = 0;

      setTimeout(() => {
        current++;
        if (current === puzzles.length) {
          revealGift();
        } else {
          app.style.opacity = 1;
          renderPuzzle();
        }
      }, 250);

    } else {
      document.getElementById("error").textContent = "❌ Not quite — try again!";
    }
  }

  function revealGift() {
    app.style.opacity = 1;
    app.innerHTML = `
      <div class="reveal">
        <h1>🎉 You did it!</h1>
        <p>25 memories. 25 questions.</p>
        <p>Your gift 🎁</p>
        <div class="code">${STEAM_CODE}</div>
        <p style="opacity:0.75;font-size:14px;margin-top:16px;">
          Steam → Games → Activate a Product
        </p>
      </div>
    `;
  }

  renderPuzzle();
</script>

</body>
</html>
